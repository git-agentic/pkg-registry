name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22", "24"] # Maintenance LTS + Active LTS
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y bubblewrap
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true   # Ubuntu 24.04 unprivileged-userns mitigation; best-effort (absent key ⇒ already unrestricted). The "no silent skip" test below is the real gate.
      - run: npm ci
      - run: npm run build
      - run: npm run fixtures
      - run: npm run benchmark:publish
      - run: npm test
